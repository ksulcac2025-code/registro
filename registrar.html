<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro de Pagos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button, input, select {
      font-size: 16px;
      padding: 10px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      padding: 12px;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border: 1px solid #ddd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      border-bottom: 1px solid #e5e5e5;
      padding: 10px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background: #fafafa;
    }

    .badge-ingreso {
      color: green;
      font-weight: bold;
    }

    .badge-egreso {
      color: #b00020;
      font-weight: bold;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 16px;
      border: 1px solid #ccc;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .status {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 20px;
      }

      button, input, select {
        width: 100%;
      }

      .topbar {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Registro de Pagos</h1>

    <div class="topbar">
      <button id="openModalBtn">Agregar</button>
      <select id="clienteFiltro">
        <option value="">Todos los clientes</option>
      </select>
    </div>

    <div class="status" id="status">Cargando...</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Cliente</th>
            <th>Proveedor</th>
            <th>Concepto</th>
            <th>N° Operación</th>
            <th>Monto</th>
          </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <h2 style="margin-top:0;font-size:18px;">Nuevo registro</h2>

      <form id="formRegistro">
        <div class="form-group">
          <label for="tipo">Tipo</label>
          <select id="tipo" name="tipo" required>
            <option value="Ingreso">Ingreso</option>
            <option value="Egreso">Egreso</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cliente">Cliente</label>
          <input id="cliente" name="cliente" type="text" required>
        </div>

        <div class="form-group" id="proveedorWrap">
          <label for="proveedor">Proveedor</label>
          <input id="proveedor" name="proveedor" type="text">
        </div>

        <div class="form-group">
          <label for="concepto">Concepto</label>
          <input id="concepto" name="concepto" type="text" required>
        </div>

        <div class="form-group">
          <label for="numeroOperacion">Número de operación</label>
          <input id="numeroOperacion" name="numeroOperacion" type="text">
        </div>

        <div class="form-group">
          <label for="monto">Monto</label>
          <input id="monto" name="monto" type="number" step="0.01" required>
        </div>

        <div class="actions">
          <button type="button" id="closeModalBtn">Cerrar</button>
          <button type="submit" id="saveBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyk3jmEcLYrLmUhuLCTCt_aKvryyG4h49cC85KPy_9iw1yUpuccCerjTeGtMxL3YBYL/exec';

    const modal = document.getElementById('modal');
    const openModalBtn = document.getElementById('openModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const formRegistro = document.getElementById('formRegistro');
    const tablaBody = document.getElementById('tablaBody');
    const statusEl = document.getElementById('status');
    const clienteFiltro = document.getElementById('clienteFiltro');
    const tipoSelect = document.getElementById('tipo');
    const proveedorWrap = document.getElementById('proveedorWrap');
    const proveedorInput = document.getElementById('proveedor');
    const saveBtn = document.getElementById('saveBtn');

    let registros = [];

    function openModal() {
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
      formRegistro.reset();
      tipoSelect.value = 'Ingreso';
      toggleProveedor();
    }

    function toggleProveedor() {
      const esEgreso = tipoSelect.value === 'Egreso';
      proveedorWrap.style.display = esEgreso ? 'block' : 'none';
      if (!esEgreso) proveedorInput.value = '';
    }

    function renderFiltroClientes() {
      const clientes = [...new Set(registros.map(r => (r.cliente || '').trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'es'));

      const actual = clienteFiltro.value;
      clienteFiltro.innerHTML = '<option value="">Todos los clientes</option>';

      clientes.forEach(cliente => {
        const option = document.createElement('option');
        option.value = cliente;
        option.textContent = cliente;
        clienteFiltro.appendChild(option);
      });

      clienteFiltro.value = clientes.includes(actual) ? actual : '';
    }

    function renderTabla() {
      const cliente = clienteFiltro.value;
      const data = cliente
        ? registros.filter(r => r.cliente === cliente)
        : registros;

      tablaBody.innerHTML = '';

      if (data.length === 0) {
        tablaBody.innerHTML = '<tr><td colspan="7">No hay registros</td></tr>';
        return;
      }

      data.forEach(r => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td>${escapeHtml(r.fecha || '')}</td>
          <td class="${r.tipo === 'Ingreso' ? 'badge-ingreso' : 'badge-egreso'}">${escapeHtml(r.tipo || '')}</td>
          <td>${escapeHtml(r.cliente || '')}</td>
          <td>${escapeHtml(r.proveedor || '')}</td>
          <td>${escapeHtml(r.concepto || '')}</td>
          <td>${escapeHtml(r.numeroOperacion || '')}</td>
          <td>${Number(r.monto || 0).toFixed(2)}</td>
        `;

        tablaBody.appendChild(tr);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function cargarDatos() {
      statusEl.textContent = 'Cargando...';

      try {
        const res = await fetch(API_URL);
        const json = await res.json();

        registros = (json.data || []).slice().reverse(); // últimos arriba
        renderFiltroClientes();
        renderTabla();
        statusEl.textContent = '';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Error al cargar datos';
      }
    }

    formRegistro.addEventListener('submit', async function (e) {
      e.preventDefault();

      saveBtn.disabled = true;
      saveBtn.textContent = 'Guardando...';

      try {
        const formData = new FormData(formRegistro);
        const body = new URLSearchParams(formData);

        const res = await fetch(API_URL, {
          method: 'POST',
          body
        });

        const json = await res.json();

        if (!json.ok) {
          alert(json.error || 'No se pudo guardar');
          return;
        }

        closeModal();
        await cargarDatos();
      } catch (error) {
        console.error(error);
        alert('Error al guardar');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Guardar';
      }
    });

    openModalBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    clienteFiltro.addEventListener('change', renderTabla);
    tipoSelect.addEventListener('change', toggleProveedor);

    modal.addEventListener('click', function (e) {
      if (e.target === modal) closeModal();
    });

    toggleProveedor();
    cargarDatos();
  </script>
</body>
</html>
